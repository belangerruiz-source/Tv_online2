<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Test TV</title>
</head>

<body style="background:black; color:white;">

<h2>📺 Test Canales</h2>

<video id="video" controls autoplay width="100%"></video>

<div id="canales"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
let video = document.getElementById('video');
let hls;

function cambiarCanal(url) {
  if (hls) hls.destroy();

  if (Hls.isSupported()) {
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else {
    video.src = url;
  }
}

fetch("canales2.json")
  .then(res => res.json())
  .then(data => {

    data.forEach(canal => {
      let btn = document.createElement("button");
      btn.innerText = canal.name;

      btn.onclick = () => cambiarCanal(canal.url);

      document.getElementById("canales").appendChild(btn);
    });

  });
</script>

</body>
</html>
